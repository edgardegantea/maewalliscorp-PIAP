<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIAP - API Tester</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #1e1e1e; 
            color: #d4d4d4; 
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #4ec9b0; margin-bottom: 30px; }
        .section { 
            background: #2d2d2d; 
            padding: 20px; 
            margin-bottom: 20px; 
            border-radius: 8px;
            border-left: 4px solid #007acc;
        }
        h2 { color: #dcdcaa; margin-bottom: 15px; }
        .form-group { margin-bottom: 15px; }
        label { 
            display: block; 
            margin-bottom: 5px; 
            color: #9cdcfe;
            font-weight: 500;
        }
        input, select, textarea { 
            width: 100%; 
            padding: 10px; 
            background: #3c3c3c; 
            border: 1px solid #555; 
            border-radius: 4px;
            color: #d4d4d4;
            font-size: 14px;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #007acc;
        }
        button { 
            background: #0e639c; 
            color: white; 
            padding: 12px 24px; 
            border: none; 
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.3s;
        }
        button:hover { background: #1177bb; }
        button:disabled { background: #555; cursor: not-allowed; }
        .response { 
            margin-top: 20px; 
            padding: 15px; 
            background: #1e1e1e; 
            border-radius: 4px;
            border: 1px solid #555;
        }
        .response pre { 
            color: #ce9178; 
            white-space: pre-wrap; 
            word-wrap: break-word;
            font-size: 12px;
        }
        .success { border-left: 4px solid #4ec9b0; }
        .error { border-left: 4px solid #f48771; }
        .token-display {
            background: #264f78;
            padding: 10px;
            border-radius: 4px;
            margin-top: 10px;
            font-size: 12px;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 PIAP - API Tester</h1>
        
        <!-- REGISTRO -->
        <div class="section">
            <h2>1. Registrar Usuario</h2>
            <div class="form-group">
                <label>Username:<label>
                <input type="text" id="reg-username" value="testuser" />
            </div>
            <div class="form-group">
                <label>Email:<label>
                <input type="email" id="reg-email" value="test@example.com" />
            </div>
            <div class="form-group">
                <label>Nombre Completo:<label>
                <input type="text" id="reg-fullname" value="Usuario de Prueba" />
            </div>
            <div class="form-group">
                <label>Contraseña:<label>
                <input type="password" id="reg-password" value="Test1234!" />
            </div>
            <div class="form-group">
                <label>Confirmar Contraseña:<label>
                <input type="password" id="reg-password-confirm" value="Test1234!" />
            </div>
            <div class="form-group">
                <label>Rol:<label>
                <select id="reg-role">
                    <option value="TEAM_MEMBER">Team Member</option>
                    <option value="PM">Project Manager</option>
                    <option value="DIRECTOR">Director</option>
                    <option value="ADMIN">Admin</option>
                </select>
            </div>
            <button onclick="register()">Registrar</button>
            <div id="register-response" class="response" style="display:none;"></div>
        </div>

        <!-- LOGIN -->
        <div class="section">
            <h2>2. Iniciar Sesión</h2>
            <div class="form-group">
                <label>Username:<label>
                <input type="text" id="login-username" value="testuser" />
            </div>
            <div class="form-group">
                <label>Contraseña:<label>
                <input type="password" id="login-password" value="Test1234!" />
            </div>
            <button onclick="login()">Iniciar Sesión</button>
            <div id="login-response" class="response" style="display:none;"></div>
            <div id="token-display" class="token-display" style="display:none;"></div>
        </div>

        <!-- PERFIL -->
        <div class="section">
            <h2>3. Ver Perfil (requiere token)</h2>
            <div class="form-group">
                <label>Access Token:<label>
                <input type="text" id="profile-token" placeholder="Pega el token del login aquí" />
            </div>
            <button onclick="getProfile()">Obtener Perfil</button>
            <div id="profile-response" class="response" style="display:none;"></div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000/api/auth';
        let accessToken = '';

        async function register() {
            const data = {
                username: document.getElementById('reg-username').value,
                email: document.getElementById('reg-email').value,
                full_name: document.getElementById('reg-fullname').value,
                password: document.getElementById('reg-password').value,
                password_confirm: document.getElementById('reg-password-confirm').value,
                role: document.getElementById('reg-role').value
            };

            try {
                const response = await fetch(`${API_URL}/register/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                const responseDiv = document.getElementById('register-response');
                responseDiv.style.display = 'block';
                responseDiv.className = response.ok ? 'response success' : 'response error';
                responseDiv.innerHTML = `<pre>${JSON.stringify(result, null, 2)}</pre>`;

                if (response.ok && result.tokens) {
                    accessToken = result.tokens.access;
                    document.getElementById('profile-token').value = accessToken;
                }
            } catch (error) {
                document.getElementById('register-response').innerHTML = 
                    `<pre class="error">Error: ${error.message}</pre>`;
            }
        }

        async function login() {
            const data = {
                username: document.getElementById('login-username').value,
                password: document.getElementById('login-password').value
            };

            try {
                const response = await fetch(`${API_URL}/login/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                const responseDiv = document.getElementById('login-response');
                responseDiv.style.display = 'block';
                responseDiv.className = response.ok ? 'response success' : 'response error';
                responseDiv.innerHTML = `<pre>${JSON.stringify(result, null, 2)}</pre>`;

                if (response.ok && result.tokens) {
                    accessToken = result.tokens.access;
                    document.getElementById('profile-token').value = accessToken;
                    document.getElementById('token-display').style.display = 'block';
                    document.getElementById('token-display').textContent = 
                        `✅ Token guardado: ${accessToken.substring(0, 50)}...`;
                }
            } catch (error) {
                document.getElementById('login-response').innerHTML = 
                    `<pre class="error">Error: ${error.message}</pre>`;
            }
        }

        async function getProfile() {
            const token = document.getElementById('profile-token').value || accessToken;

            if (!token) {
                alert('Primero debes iniciar sesión o pegar un token válido');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/profile/`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                const result = await response.json();
                const responseDiv = document.getElementById('profile-response');
                responseDiv.style.display = 'block';
                responseDiv.className = response.ok ? 'response success' : 'response error';
                responseDiv.innerHTML = `<pre>${JSON.stringify(result, null, 2)}</pre>`;
            } catch (error) {
                document.getElementById('profile-response').innerHTML = 
                    `<pre class="error">Error: ${error.message}</pre>`;
            }
        }
    </script>
</body>
</html>
